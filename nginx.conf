server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /msp-register/ {
    rewrite ^/msp-register/(.*)$ /$1 break;
    try_files $uri $uri/ /index.html;
  }

  location ~* ^/msp-register/.*\.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
    rewrite ^/msp-register/(.*)$ /$1 break;
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}